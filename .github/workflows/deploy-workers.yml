name: deploy-workers

on:
  push:
    branches: [main]
    paths: ["workers/**", ".github/workflows/deploy-workers.yml"]
  workflow_dispatch:

jobs:
  deploy:
    # Skip entirely if Cloudflare credentials aren't configured yet.
    if: ${{ vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [api, github-bot, indexer, renderer]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: "pnpm" }
      # No --frozen-lockfile yet: pnpm-lock.yaml is generated on the first
      # successful `pnpm install` and committed by the maintainer.
      - run: pnpm install
      - name: Apply D1 migrations
        if: matrix.worker == 'api'
        run: pnpm --filter @generatedart/api exec wrangler d1 migrations apply generatedart --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy ${{ matrix.worker }}
        run: pnpm --filter @generatedart/${{ matrix.worker }} exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
