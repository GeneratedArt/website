# OPTIONAL: GitHub Pages mirror.
#
# Only used if you set the repo's Pages source to "GitHub Actions" in
# Settings → Pages. The default source ("Deploy from a branch") runs an
# implicit pages-build-and-deployment workflow that ignores this file and
# fails because Jekyll moved into site/.
#
# If you don't want a GitHub Pages mirror at all (the spec calls for
# Cloudflare Pages), set Settings → Pages → Source = None and DELETE this
# file — its presence alone is harmless, but cleaner to remove it.

name: pages

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: site
      - name: Build Jekyll
        run: bundle exec jekyll build
        working-directory: site
        env:
          JEKYLL_ENV: production
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
