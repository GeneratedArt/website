# Reusable workflow used by every GeneratedArt/art-<slug> repo.
# Repos call it via `uses: GeneratedArt/platform/.github/workflows/validate-bundle.yml@main`.
name: validate-bundle

on:
  workflow_call:
    inputs:
      bundle_dir:
        type: string
        default: "."
      max_bytes:
        type: number
        default: 3145728  # 3 MiB

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bundle exists and has index.html
        working-directory: ${{ inputs.bundle_dir }}
        run: test -f index.html
      - name: Size check
        working-directory: ${{ inputs.bundle_dir }}
        run: |
          set -e
          zip -qr /tmp/bundle.zip .
          SIZE=$(stat -c%s /tmp/bundle.zip)
          echo "Bundle size: $SIZE bytes (max ${{ inputs.max_bytes }})"
          [ "$SIZE" -le "${{ inputs.max_bytes }}" ]
      - name: Forbid network calls
        working-directory: ${{ inputs.bundle_dir }}
        run: |
          set -e
          ! grep -RInE 'fetch\(|XMLHttpRequest|import\(|importScripts\(|navigator\.sendBeacon' \
            --include='*.js' --include='*.html' --include='*.mjs' . \
            || (echo "Forbidden network primitive detected" && exit 1)
      - name: Dependency allowlist
        working-directory: ${{ inputs.bundle_dir }}
        run: |
          set -e
          ALLOW='p5|three|regl|tone|d3'
          BAD=$(grep -RIohE 'src="[^"]+\.js"' --include='*.html' . | \
            grep -vE "(${ALLOW})" || true)
          if [ -n "$BAD" ]; then echo "Disallowed deps:"; echo "$BAD"; exit 1; fi
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Determinism check (twice == identical pixels)
        working-directory: ${{ inputs.bundle_dir }}
        run: |
          npm i -g puppeteer@23
          node -e "
            const p = require('puppeteer');
            const fs = require('fs');
            (async () => {
              for (const i of [1,2]) {
                const b = await p.launch({ args:['--no-sandbox'] });
                const pg = await b.newPage();
                await pg.setContent(fs.readFileSync('index.html','utf8'));
                await pg.evaluate(() => window.\$ga = { hash:'0xdeadbeef', rand: () => 0.5, features:{} });
                await new Promise(r => setTimeout(r, 1500));
                await pg.screenshot({ path: '/tmp/run'+i+'.png' });
                await b.close();
              }
              const a = require('crypto').createHash('sha256').update(fs.readFileSync('/tmp/run1.png')).digest('hex');
              const b = require('crypto').createHash('sha256').update(fs.readFileSync('/tmp/run2.png')).digest('hex');
              if (a !== b) { console.error('Non-deterministic:', a, b); process.exit(1); }
              console.log('Deterministic:', a);
            })();
          "
