name: build-site

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/build-site.yml"]
  pull_request:
    paths: ["site/**"]
  schedule:
    - cron: "17 4 * * *" # nightly rebuild for fresh _data
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: site } }
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.2", bundler-cache: true, working-directory: site }
      - name: Pull D1 exports into _data
        env:
          API_BASE: ${{ secrets.API_BASE_URL }}
        run: |
          mkdir -p _data
          curl -fsSL "$API_BASE/projects" -o _data/projects.json || echo '{"projects":[]}' > _data/projects.json
      - run: bundle exec jekyll build
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: generatedart-site
          directory: site/_site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
