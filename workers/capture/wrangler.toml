name = "generatedart-capture"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
RENDERER_BASE = "https://renderer.generatedart.com"
IPFS_GATEWAY = "https://ipfs.generatedart.com"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "generatedart-assets"

[[d1_databases]]
binding = "DB"
database_name = "generatedart"
database_id = "6c83d3f6-b3be-4e8d-9be2-a3274ad24e2a"

# Cloudflare Browser Rendering binding. Requires the Browser Rendering add-on
# on the account; without it `wrangler deploy` will refuse.
[browser]
binding = "BROWSER"

# Drains the same queue the API worker produces to.
[[queues.consumers]]
queue = "render-jobs"
max_batch_size = 4
max_batch_timeout = 10
max_retries = 3
dead_letter_queue = "render-jobs-dlq"

[env.production]
vars = { ENVIRONMENT = "production" }
