name = "generatedart-github-bot"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
GITHUB_ORG = "GeneratedArt"

[[d1_databases]]
binding = "DB"
database_name = "generatedart"
database_id = "REPLACE_WITH_D1_ID"

[[queues.producers]]
binding = "PIN_QUEUE"
queue = "ipfs-pin-jobs"

[env.production]
routes = [
  { pattern = "bot.generatedart.com/*", zone_name = "generatedart.com" }
]
