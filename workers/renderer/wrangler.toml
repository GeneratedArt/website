name = "generatedart-renderer"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
IPFS_GATEWAY = "https://ipfs.generatedart.com"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "generatedart-assets"

[env.production]
routes = [
  { pattern = "renderer.generatedart.com/*", zone_name = "generatedart.com" }
]
